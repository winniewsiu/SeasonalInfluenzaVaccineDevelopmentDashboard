name: Publish dashboard to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Validate and package static dashboard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Validate required dashboard files
        run: |
          test -f index.html
          test -d assets
          test -d data
          python3 -m json.tool data/evidence_records.json > /tmp/evidence_records_checked.json
          if [ -f scripts/validate_data.py ]; then
            python3 scripts/validate_data.py
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Prepare static site artifact
        run: |
          rm -rf _site
          mkdir -p _site
          cp index.html _site/
          cp -R assets _site/assets
          cp -R data _site/data
          if [ -d docs ]; then cp -R docs _site/docs; fi
          if [ -f README.md ]; then cp README.md _site/README.md; fi
          touch _site/.nojekyll
          find _site -maxdepth 2 -type f | sort

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy artifact
        id: deployment
        uses: actions/deploy-pages@v4
