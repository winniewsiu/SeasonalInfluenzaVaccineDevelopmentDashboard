name: Update evidence surveillance candidates

on:
  workflow_dispatch:
  schedule:
    - cron: "15 10 * * MON"

permissions:
  contents: write
  pull-requests: write

jobs:
  update-candidates:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch PubMed candidates
        env:
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
          NCBI_EMAIL: ${{ vars.NCBI_EMAIL }}
        run: python scripts/fetch_pubmed.py

      - name: Fetch ClinicalTrials.gov candidates
        run: python scripts/fetch_clinicaltrials.py

      - name: Classify unverified candidates
        run: python scripts/classify_records.py

      - name: Validate curated dashboard data
        run: python scripts/validate_data.py

      - name: Open pull request with unverified candidates
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Update influenza evidence surveillance candidates"
          title: "Update unverified influenza evidence candidates"
          body: |
            This automated PR refreshes candidate PubMed and ClinicalTrials.gov evidence records.

            Review `data/evidence_records_auto.json` and move accepted records into `data/evidence_records.json` with verification set to `seed-manual` or another reviewed label.
          branch: evidence-surveillance-candidates
          delete-branch: true
